{% extends "base.html" %}
{% block title %}Login – SecureVote{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card auth-card border-0 shadow-lg">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <i class="fas fa-sign-in-alt fa-3x text-primary mb-3"></i>
            <h2 class="fw-bold text-white">Welcome Back</h2>
            <p class="text-muted">Sign in to your account</p>
          </div>

          <form method="POST" action="{{ url_for('auth.login') }}" novalidate id="loginForm">
            <!-- CSRF Token – prevents Cross-Site Request Forgery -->
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

            <div class="mb-3">
              <label for="username" class="form-label text-light">Username</label>
              <div class="input-group">
                <span class="input-group-text bg-dark border-secondary">
                  <i class="fas fa-user text-muted"></i>
                </span>
                <input type="text" class="form-control bg-dark text-white border-secondary"
                       id="username" name="username" placeholder="Enter username"
                       required maxlength="30" autocomplete="username" />
              </div>
            </div>

            <div class="mb-4">
              <label for="password" class="form-label text-light">Password</label>
              <div class="input-group">
                <span class="input-group-text bg-dark border-secondary">
                  <i class="fas fa-lock text-muted"></i>
                </span>
                <input type="password" class="form-control bg-dark text-white border-secondary"
                       id="password" name="password" placeholder="Enter password"
                       required autocomplete="current-password" />
                <button class="btn btn-outline-secondary" type="button" id="togglePwd">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
              <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>
          </form>

          <hr class="border-secondary my-4" />
          <p class="text-center text-muted mb-0">
            Don't have an account?
            <a href="{{ url_for('auth.register') }}" class="text-primary fw-semibold">Register here</a>
          </p>
        </div>
      </div>

      <!-- Security note -->
      <div class="text-center mt-3">
        <small class="text-muted">
          <i class="fas fa-shield-alt me-1 text-success"></i>
          Protected by CSRF tokens &amp; rate limiting
        </small>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  // Toggle password visibility
  document.getElementById('togglePwd').addEventListener('click', function () {
    const pwd = document.getElementById('password');
    const icon = this.querySelector('i');
    if (pwd.type === 'password') {
      pwd.type = 'text';
      icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
      pwd.type = 'password';
      icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
  });

  // Client-side validation (server-side is the real guard)
  document.getElementById('loginForm').addEventListener('submit', function (e) {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    if (!u || !p) {
      e.preventDefault();
      alert('Please fill in all fields.');
    }
  });
</script>
{% endblock %}
