{% extends "admin/base_admin.html" %}
{% block title %}Edit Candidate – Admin{% endblock %}

{% block content %}
<div class="mb-3">
  <h3 class="mb-0">Edit Candidate</h3>
  <p class="text-muted">Update candidate details</p>
</div>

<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card p-4">
      <form method="POST" action="{{ url_for('admin.edit_candidate', cid=candidate.id) }}" enctype="multipart/form-data" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

        <div class="mb-3">
          <label class="form-label">Full Name *</label>
          <input type="text" class="form-control" name="name" value="{{ candidate.name }}" required maxlength="120" />
        </div>

        <div class="mb-3">
          <label class="form-label">Party *</label>
          <input type="text" class="form-control" name="party" value="{{ candidate.party }}" required maxlength="120" />
        </div>

        <div class="mb-3">
          <label class="form-label">Bio</label>
          <textarea class="form-control" name="bio" rows="4" maxlength="500">{{ candidate.bio or '' }}</textarea>
        </div>

        <div class="mb-3">
          <label class="form-label">Current Photo</label>
          <div class="d-flex align-items-center gap-3 mb-3">
            <div style="width:96px;height:96px;border-radius:12px;overflow:hidden;border:1px solid #eef0ea;display:flex;align-items:center;justify-content:center;background:#fff">
              <img src="{{ url_for('static', filename='uploads/' + (candidate.photo or 'default_candidate.png')) }}" alt="{{ candidate.name }}" style="width:100%;height:100%;object-fit:cover;" data-default-src="{{ url_for('static', filename='images/default_candidate.png') }}">
            </div>
            <div style="flex:1">
              <label class="upload-box" style="display:block; padding:12px; border:1px dashed #E3E6D8; border-radius:10px; text-align:center; background:#fafaf8; cursor:pointer;">
                <input type="file" name="photo" accept=".png,.jpg,.jpeg,.gif,.webp" style="display:none;" />
                <div class="text-muted">Upload image (PNG/JPG) or leave blank to keep current photo</div>
              </label>
            </div>
          </div>
        </div>

        <div class="d-flex gap-3">
          <button type="submit" class="btn btn-primary px-4">
            <i class="fas fa-save me-2"></i>Update
          </button>
          <a href="{{ url_for('admin.candidates') }}" class="btn btn-outline-secondary px-4">
            <i class="fas fa-times me-2"></i>Cancel
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
