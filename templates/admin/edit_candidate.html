{% extends "admin/base_admin.html" %}
{% block title %}Edit Candidate – Admin{% endblock %}

{% block content %}
<div class="mb-4">
  <h3 class="text-white fw-bold">
    <i class="fas fa-edit me-2 text-warning"></i>Edit Candidate
  </h3>
</div>

<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card border-0 shadow">
      <div class="card-body p-5">
        <form method="POST" action="{{ url_for('admin.edit_candidate', cid=candidate.id) }}"
              enctype="multipart/form-data" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

          <div class="mb-3">
            <label class="form-label text-light">Full Name *</label>
            <input type="text" class="form-control bg-dark text-white border-secondary"
                   name="name" value="{{ candidate.name }}" required maxlength="120" />
          </div>

          <div class="mb-3">
            <label class="form-label text-light">Party *</label>
            <input type="text" class="form-control bg-dark text-white border-secondary"
                   name="party" value="{{ candidate.party }}" required maxlength="120" />
          </div>

          <div class="mb-3">
            <label class="form-label text-light">Bio</label>
            <textarea class="form-control bg-dark text-white border-secondary"
                      name="bio" rows="3" maxlength="500">{{ candidate.bio or '' }}</textarea>
          </div>

          <div class="mb-3">
            <label class="form-label text-light">Current Photo</label>
            <div class="mb-2">
              <img src="{{ url_for('static', filename='uploads/' + candidate.photo) }}"
                   alt="{{ candidate.name }}" class="candidate-photo"
                   onerror="this.src='{{ url_for('static', filename='images/default_candidate.png') }}'">
            </div>
            <input type="file" class="form-control bg-dark text-white border-secondary"
                   name="photo" accept=".png,.jpg,.jpeg,.gif,.webp" />
            <div class="form-text text-muted">Leave blank to keep current photo.</div>
          </div>

          <div class="d-flex gap-3">
            <button type="submit" class="btn btn-warning px-4 text-dark">
              <i class="fas fa-save me-2"></i>Update
            </button>
            <a href="{{ url_for('admin.candidates') }}" class="btn btn-secondary px-4">
              <i class="fas fa-times me-2"></i>Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
