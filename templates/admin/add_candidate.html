{% extends "admin/base_admin.html" %}
{% block title %}Add Candidate – Admin{% endblock %}

{% block content %}
<div class="mb-4">
  <h3 class="text-white fw-bold">
    <i class="fas fa-user-plus me-2 text-success"></i>Add Candidate
  </h3>
</div>

<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card border-0 shadow">
      <div class="card-body p-5">
        <form method="POST" action="{{ url_for('admin.add_candidate') }}"
              enctype="multipart/form-data" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

          <div class="mb-3">
            <label class="form-label text-light">Full Name *</label>
            <input type="text" class="form-control bg-dark text-white border-secondary"
                   name="name" required maxlength="120" placeholder="Candidate full name" />
          </div>

          <div class="mb-3">
            <label class="form-label text-light">Party *</label>
            <input type="text" class="form-control bg-dark text-white border-secondary"
                   name="party" required maxlength="120" placeholder="Political party" />
          </div>

          <div class="mb-3">
            <label class="form-label text-light">Bio</label>
            <textarea class="form-control bg-dark text-white border-secondary"
                      name="bio" rows="3" maxlength="500"
                      placeholder="Short biography (optional)"></textarea>
          </div>

          <div class="mb-4">
            <label class="form-label text-light">Photo</label>
            <input type="file" class="form-control bg-dark text-white border-secondary"
                   name="photo" accept=".png,.jpg,.jpeg,.gif,.webp" />
            <div class="form-text text-muted">
              Allowed: PNG, JPG, JPEG, GIF, WEBP. Max 2 MB.
            </div>
          </div>

          <div class="d-flex gap-3">
            <button type="submit" class="btn btn-success px-4">
              <i class="fas fa-save me-2"></i>Save Candidate
            </button>
            <a href="{{ url_for('admin.candidates') }}" class="btn btn-secondary px-4">
              <i class="fas fa-times me-2"></i>Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
