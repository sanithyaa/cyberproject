{% extends "base.html" %}
{% block title %}429 Too Many Requests{% endblock %}
{% block content %}
<div class="container py-5 text-center">
  <i class="fas fa-exclamation-triangle fa-5x text-warning mb-4"></i>
  <h1 class="text-white display-4 fw-bold">429</h1>
  <h3 class="text-warning mb-3">Too Many Requests</h3>
  <p class="text-muted">You've made too many requests. Please wait a moment before trying again.</p>
  <a href="{{ url_for('public.index') }}" class="btn btn-primary mt-3">
    <i class="fas fa-home me-2"></i>Go Home
  </a>
</div>
{% endblock %}
