{% extends "base.html" %}
{% block title %}500 Server Error{% endblock %}
{% block content %}
<div class="container py-5 text-center">
  <i class="fas fa-server fa-5x text-danger mb-4"></i>
  <h1 class="text-white display-4 fw-bold">500</h1>
  <h3 class="text-danger mb-3">Internal Server Error</h3>
  <p class="text-muted">Something went wrong on our end. Please try again later.</p>
  <a href="{{ url_for('public.index') }}" class="btn btn-primary mt-3">
    <i class="fas fa-home me-2"></i>Go Home
  </a>
</div>
{% endblock %}
